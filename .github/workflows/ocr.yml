name: OCR scanned House PTRs

# Dedicated OCR pipeline for scanned (paper) House PTRs. OCR is slow (~2 min/filing
# on a hosted runner), so it now runs LOCALLY only — the daily schedule was retired
# to keep it off GitHub's runners. Run `python src/ocr_scanned.py` on your machine to
# drain the queue; the report surfaces the remaining backlog (data/ocr_state.json).
#
# This workflow is kept as a MANUAL escape hatch (workflow_dispatch) in case you ever
# want CI to catch up the queue. Each run drains a capped, resumable slice (config
# ocr.max_filings_per_run) and commits the new ledger rows.

on:
  # No schedule: OCR runs locally. Trigger from the Actions tab only if you need CI to
  # process the backlog. To re-enable automatic runs, restore a `schedule:` cron here.
  workflow_dispatch:
    inputs:
      max_filings:
        description: "Max scanned filings to OCR this run (overrides config cap)"
        required: false

# Never let two OCR runs overlap — they share the queue and both push to main.
concurrency:
  group: ocr
  cancel-in-progress: false

jobs:
  ocr:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system OCR deps
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr poppler-utils

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: OCR scanned House PTRs (capped, resumable)
        run: |
          python src/ocr_scanned.py ${{ github.event.inputs.max_filings && format('--max-filings {0}', github.event.inputs.max_filings) || '' }}
        env:
          HTTP_USER_AGENT: ${{ secrets.HTTP_USER_AGENT }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet && { echo "No OCR changes to commit."; exit 0; }
          git commit -m "OCR scanned House PTRs $(date +%Y-%m-%d)"
          # Rebase onto any concurrent run-tracker push before pushing.
          git pull --rebase --autostash origin main
          git push
